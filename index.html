<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Eco! - Jornal do DAHJ</title>
    <link rel="stylesheet" href="style.css"> <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
</head>
<body>

    <header>
        <h1>📰 O Eco!</h1>
        <p>Informativo do Diretório Acadêmico Hermann Júnior</p>
    </header>

    <main id="lista-artigos">
        <p>A carregar as últimas notícias...</p>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>

    <script>
        // 1. CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDtMO8dbJWXcIdmhCAtvYdxKlntulcYqBI",
            projectId: "dahj-hub",
            messagingSenderId: "964532263352",
            appId: "1:964532263352:web:fe3d32318ed86be611d74d"
        };

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // 2. URL DO SEU DEPLOY (WEB APP) DO APPS SCRIPT
        // IMPORTANTE: Substitua pelo link que obteve no "Nova Implantação"
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbymHs-93cO2OXZz4F8vSFBI8op0EokqkOCD7iuByEbAsaJz4LuOhqmNQZvVvWLEqvg/exec";

        // 3. FUNÇÃO PARA ENVIAR O TOKEN PARA A PLANILHA
        function registrarTokenNoServidor(token) {
            console.log("A registar o seu dispositivo no jornal...");
            
            fetch(URL_APPS_SCRIPT, {
                method: 'POST',
                mode: 'no-cors', // Fundamental para sites estáticos
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            })
            .then(() => console.log("Pronto! Já faz parte da lista de leitores."))
            .catch(err => console.error("Erro ao registar token:", err));
        }

        // 4. SOLICITAR PERMISSÃO E GERAR TOKEN
        function inicializarNotificacoes() {
            messaging.getToken({ 
                vapidKey: 'BG3IO3TVoOS_rc9fyJiwjOXQBhcVonLq-yRNWXsafpjWkuFa5nZM8QXPOKYwq_7WN7DmOBa11PQNNqkW9qz6qCE' // Pegue na aba Cloud Messaging do Firebase
            })
            .then((currentToken) => {
                if (currentToken) {
                    registrarTokenNoServidor(currentToken);
                } else {
                    console.warn('Permissão negada ou token não gerado.');
                }
            })
            .catch((err) => {
                console.error('Erro ao processar notificações:', err);
            });
        }

        // 5. REGISTO DO SERVICE WORKER E INICIALIZAÇÃO
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then((registration) => {
                console.log('Service Worker ativo:', registration.scope);
                // Após o SW registar, tentamos obter o token
                inicializarNotificacoes();
            });
        }

        // 6. LÓGICA PARA CARREGAR OS ARTIGOS (Sua função doGet do Apps Script)
        function carregarArtigos() {
            fetch(URL_APPS_SCRIPT)
            .then(res => res.json())
            .then(artigos => {
                const container = document.getElementById('lista-artigos');
                if (artigos.length === 0) {
                    container.innerHTML = "<p>Nenhuma notícia encontrada.</p>";
                    return;
                }
                
                container.innerHTML = artigos.map(art => `
                    <article class="card">
                        <h2>${art.titulo}</h2>
                        <small>Por ${art.autor} em ${new Date(art.data).toLocaleDateString()}</small>
                        <p>${art.conteudo.substring(0, 150)}...</p>
                    </article>
                `).join('');
            });
        }

        carregarArtigos();
    </script>
</body>
</html>
