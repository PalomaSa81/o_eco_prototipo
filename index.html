<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Eco! - Jornal do DAHJ</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003366">
    <link rel="apple-touch-icon" href="logo-dahj.jpg">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #003366; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: var(--bg); }
        header { 
            background: linear-gradient(rgba(0,51,102,0.85), rgba(0,51,102,0.85)), url('capa-chapa.jpg') center/cover;
            color: white; padding: 50px 20px; text-align: center; 
        }
        header img { width: 70px; border-radius: 50%; border: 2px solid white; margin-bottom: 10px; }
        .container { max-width: 700px; margin: -30px auto 50px; padding: 0 15px; }
        .card { 
            background: var(--white); border-radius: 12px; padding: 25px; margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 6px solid var(--primary);
        }
        .card h2 { margin: 0 0 10px; color: var(--primary); font-size: 1.6rem; }
        .card-meta { font-size: 0.85rem; color: #666; margin-bottom: 15px; display: flex; gap: 15px; }
        .card-body { line-height: 1.6; color: #333; }
        .btn-refresh { 
            position: fixed; bottom: 20px; right: 20px; background: var(--primary); 
            color: white; border: none; width: 55px; height: 55px; border-radius: 50%; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        /* Estilo para a área de Debug do Token */
        #debug-token {
            font-size: 10px;
            word-break: break-all;
            padding: 20px;
            color: #666;
            background: #eee;
            margin: 20px;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }
    </style>
</head>
<body>

<header>
    <img src="logo-dahj.jpg" alt="DAHJ">
    <h1>O Eco!</h1>
    <p>Informativo Digital da Economia UFF</p>
</header>

<div class="container" id="feed">
    <div style="text-align:center; padding:50px;"><i class="fas fa-spinner fa-spin"></i> Sincronizando...</div>
</div>

<button class="btn-refresh" onclick="carregarMaterias()"><i class="fas fa-sync-alt fa-lg"></i></button>

<div id="debug-token">Aguardando Token...</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>

<script>
    // 1. Sua Configuração
    const firebaseConfig = {
        apiKey: "AIzaSyDtMO8dbJWXcIdmhCAtvYdxKlntulcYqBI",
        authDomain: "dahj-hub.firebaseapp.com",
        projectId: "dahj-hub",
        storageBucket: "dahj-hub.firebasestorage.app",
        messagingSenderId: "964532263352",
        appId: "1:964532263352:web:fe3d32318ed86be611d74d"
    };

    // 2. Coloque o ID do seu Apps Script aqui
    const URL_API_DRIVE = "https://script.google.com/macros/s/AKfycbymHs-93cO2OXZz4F8vSFBI8op0EokqkOCD7iuByEbAsaJz4LuOhqmNQZvVvWLEqvg/exec";

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then((registration) => {
                messaging.getToken({ 
                    serviceWorkerRegistration: registration,
                    vapidKey: 'BG3IO3TVoOS_rc9fyJiwjOXQBhcVonLq-yRNWXsafpjWkuFa5nZM8QXPOKYwq_7WN7DmOBa11PQNNqkW9qz6qCE' 
                }).then((token) => {
                    if (token) {
                        console.log("Token:", token);
                        document.getElementById('debug-token').innerHTML = "<strong>Seu Token (copie para o Apps Script):</strong><br>" + token;
                    }
                }).catch((err) => {
                    document.getElementById('debug-token').innerText = "Erro ao obter token: " + err;
                });
            });
        });
    }

    async function carregarMaterias() {
        const feed = document.getElementById('feed');
        try {
            const response = await fetch(URL_API_DRIVE + "?t=" + Date.now());
            const materias = await response.json();
            feed.innerHTML = '';
            materias.forEach(materia => {
                const card = document.createElement('article');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-meta">
                        <span><i class="far fa-calendar-alt"></i> ${new Date(materia.data).toLocaleDateString()}</span>
                        <span><i class="far fa-user"></i> ${materia.autor}</span>
                    </div>
                    <h2>${materia.titulo}</h2>
                    <div class="card-body">${marked.parse(materia.conteudo || "")}</div>
                `;
                feed.appendChild(card);
            });
        } catch (e) {
            feed.innerHTML = '<div class="card">Erro ao carregar matérias.</div>';
        }
    }
    window.onload = carregarMaterias;
</script>
</body>
</html>
