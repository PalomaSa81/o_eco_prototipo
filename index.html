<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Eco! - PROTÓTIPO</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="logo-dahj.jpg">
    <link rel="apple-touch-icon" href="logo-dahj.jpg">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;700&display=swap');

        :root {
            --azul-dahj: #001f4d; 
            --azul-botao: #00265e; 
            --amarelo: #FFD700;
            --bg: #f4f4f4;
            --branco: #ffffff;
            --ruido: rgba(100, 100, 100, 0.4);
        }

        /* --- MARCA D'ÁGUA DE SEGURANÇA --- */
        body::before {
            content: "MODELO PARA APRESENTAÇÃO • CONTEÚDO FICTÍCIO • MODELO PARA APRESENTAÇÃO";
            position: fixed; top: 0; width: 100%; background: #e0e0e0;
            color: #777; font-size: 10px; text-align: center; letter-spacing: 2px;
            z-index: 9999; padding: 3px 0; font-weight: bold; border-bottom: 1px solid #ccc;
        }

        .carimbo-exemplo {
            position: fixed; bottom: 80px; right: -30px; transform: rotate(-45deg);
            background: none; border: 4px double var(--ruido);
            color: var(--ruido); padding: 10px 50px; font-size: 2rem;
            font-weight: bold; text-transform: uppercase; z-index: 9998;
            pointer-events: none; letter-spacing: 5px; opacity: 0.6;
        }

        /* --- LAYOUT ORIGINAL --- */
        body { 
            margin: 0; font-family: 'IBM Plex Sans', sans-serif; 
            background: var(--bg); color: #333;
            display: flex; flex-direction: column; min-height: 100vh;
            padding-top: 18px; 
        }

        header {
            width: 100%; padding: 60px 0; text-align: center;
            background: url('bk0.png') no-repeat center center; 
            background-size: cover;
            border-bottom: 5px solid var(--amarelo);
        }

        .logo-dahj { width: 100px; } /* Removido o arredondamento e borda */
        
        header h1 { 
            color: var(--amarelo); text-transform: uppercase; font-size: 3.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6); margin: 15px 0 0 0;
            letter-spacing: 2px;
        }

        .filter-bar {
            background: var(--azul-dahj); padding: 12px;
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
            position: sticky; top: 18px; z-index: 1000;
        }

        .filter-btn {
            background: var(--azul-botao); border: none; color: var(--branco);
            padding: 8px 20px; border-radius: 4px; cursor: pointer; 
            font-size: 0.8rem; font-weight: bold; text-transform: uppercase;
            transition: 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active { background: var(--amarelo); color: var(--azul-dahj); }

        .container { max-width: 1100px; margin: 20px auto; padding: 20px; display: grid; grid-template-columns: 3fr 1fr; gap: 30px; }
        
        .card { 
            background: var(--branco); padding: 25px; border-radius: 4px; margin-bottom: 15px;
            border-left: 5px solid var(--azul-dahj); display: flex; flex-direction: column;
        }

        .card h2 { margin: 10px 0 5px 0; font-size: 1.4rem; color: var(--azul-dahj); }
        .card p, .card div { margin: 10px 0; line-height: 1.5; color: #555; }
        
        /* Bordas laterais por categoria */
        .entidade-aluno { border-left-color: #00b894; }
        .entidade-prof { border-left-color: #6c5ce7; }
        .entidade-conv { border-left-color: #e17055; }
        .entidade-dahj { border-left-color: var(--azul-dahj); }

        .btn-side {
            display: block; background: var(--azul-botao); color: white;
            text-align: center; padding: 15px; text-decoration: none; font-weight: bold;
            border-radius: 4px; margin-bottom: 10px; transition: 0.3s;
        }
        .btn-side:hover { background: var(--amarelo); color: var(--azul-dahj); }

        footer {
            margin-top: auto; padding: 50px 0 20px 0; text-align: center; width: 100%; background-color: var(--branco);
        }
        .img-chapa-footer { width: 100px; }
        .footer-text { font-size: 0.85rem; color: #444; margin: 10px 0; font-weight: bold; }
        .copyright { font-size: 0.7rem; color: #999; margin-top: 20px; }

        #debug-token { font-size: 8px; color: #ccc; word-break: break-all; margin-top: 10px; }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="carimbo-exemplo">SEM VALOR</div>

    <header>
        <img src="logo-dahj.jpg" alt="DAHJ" class="logo-dahj">
        <h1>O Eco!</h1>
    </header>

    <nav class="filter-bar">
        <button class="filter-btn active" onclick="carregarMaterias('all')">Tudo</button>
        <button class="filter-btn" onclick="carregarMaterias('dahj')">DAHJ</button>
        <button class="filter-btn" onclick="carregarMaterias('aluno')">Aluno</button>
        <button class="filter-btn" onclick="carregarMaterias('prof')">Professor</button>
    </nav>

    <div class="container">
        <main id="feed">
            <div style="text-align:center; padding:50px;">Sincronizando...</div>
        </main>

        <aside>
            <a href="https://dahj-uff.github.io/ouvidoria/" class="btn-side">OUVIDORIA</a>
            <a href="#" class="btn-side" style="opacity: 0.7;">GUIA DO CALOURO</a>
            <div style="background: var(--branco); padding: 15px; border-radius: 4px; font-size: 0.8rem; border-top: 3px solid var(--azul-dahj);">
                <strong>Aviso de Protótipo:</strong><br>
                Este site é um modelo experimental desenvolvido para a chapa A Luta Faz Eco!
            </div>
            <div id="debug-token"></div>
        </aside>
    </div>

    <footer>
        <a href="https://www.instagram.com/dahjecouff/" target="_blank">
            <img src="capa-chapa.jpg" alt="Chapa A Luta Faz Eco" class="img-chapa-footer">
        </a>
        <div class="footer-text">Chapa A Luta Faz Eco 2025-2026</div>
        <div class="copyright">© A Luta Faz Eco 2026 | Economia UFF</div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDtMO8dbJWXcIdmhCAtvYdxKlntulcYqBI",
            authDomain: "dahj-hub.firebaseapp.com",
            projectId: "dahj-hub",
            storageBucket: "dahj-hub.firebasestorage.app",
            messagingSenderId: "964532263352",
            appId: "1:964532263352:web:fe3d32318ed86be611d74d"
        };

        const URL_API_DRIVE = "https://script.google.com/macros/s/AKfycbymHs-93cO2OXZz4F8vSFBI8op0EokqkOCD7iuByEbAsaJz4LuOhqmNQZvVvWLEqvg/exec";

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        messaging.onMessage((payload) => {
            console.log('Mensagem recebida, atualizando...');
            carregarMaterias('all');
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((registration) => {
                    messaging.getToken({ 
                        serviceWorkerRegistration: registration,
                        vapidKey: 'BG3IO3TVoOS_rc9fyJiwjOXQBhcVonLq-yRNWXsafpjWkuFa5nZM8QXPOKYwq_7WN7DmOBa11PQNNqkW9qz6qCE' 
                    }).then((token) => {
                        if (token) console.log("Token Ativo");
                    });
                });
            });
        }

        async function carregarMaterias(filtro = 'all') {
            const feed = document.getElementById('feed');
            
            // Estética dos botões de filtro
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('onclick').includes(`'${filtro}'`)) btn.classList.add('active');
            });

            try {
                const response = await fetch(URL_API_DRIVE + "?t=" + Date.now());
                const materias = await response.json();
                feed.innerHTML = '';

                const filtradas = filtro === 'all' ? materias : materias.filter(m => m.categoria === filtro);

                filtradas.forEach(materia => {
                    const card = document.createElement('article');
                    // Mapeia categoria para a classe CSS correta
                    const catClass = `entidade-${materia.categoria || 'dahj'}`;
                    card.className = `card ${catClass}`;
                    
                    const data = new Date(materia.data).toLocaleDateString('pt-BR', {day:'2-digit', month:'short'}).toUpperCase();
                    
                    card.innerHTML = `
                        <small>${(materia.categoria || 'DAHJ').toUpperCase()} • ${data}</small>
                        <h2>${materia.titulo}</h2>
                        <div>${marked.parse(materia.conteudo || "")}</div>
                    `;
                    feed.appendChild(card);
                });
            } catch (e) {
                feed.innerHTML = '<div class="card">Erro ao carregar matérias.</div>';
            }
        }
        window.onload = () => carregarMaterias('all');
    </script>
</body>
</html>
